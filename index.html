<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠ EMRG KIT — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">⚠ EMRG KIT</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-menu" id="nav-menu">
      <li><a href="index.html" class="active">DASHBOARD</a></li>
      <li><a href="inventory.html">INVENTORY</a></li>
    </ul>
  </nav>

  <!-- ── Dashboard Page ── -->
  <main class="dashboard-page">
    <h1 class="page-title">// SITUATION REPORT</h1>
    <p class="page-subtitle">EMERGENCY KIT STATUS — EXPIRATION MONITORING ACTIVE</p>

    <!-- Alert Cards -->
    <div class="alert-cards-grid">

      <!-- Card: Expiring This Month -->
      <div class="card">
        <div class="card-header">
          <span class="card-header-title">⚡ EXPIRING THIS MONTH</span>
          <span class="card-count" id="expiring-this-month-count">—</span>
        </div>
        <div class="card-body" id="expiring-this-month-list">
          <p class="empty-state">// LOADING...</p>
        </div>
      </div>

      <!-- Card: Expiring Next Month -->
      <div class="card">
        <div class="card-header tan-accent">
          <span class="card-header-title">📋 EXPIRING NEXT MONTH</span>
          <span class="card-count" id="expiring-next-month-count">—</span>
        </div>
        <div class="card-body" id="expiring-next-month-list">
          <p class="empty-state">// LOADING...</p>
        </div>
      </div>

    </div>

    <!-- Summary Table -->
    <h2 class="section-heading">FULL INVENTORY SUMMARY</h2>
    <div class="summary-table-wrap">
      <table class="summary-table">
        <thead>
          <tr>
            <th>#</th>
            <th>ITEM</th>
            <th>CATEGORY</th>
            <th>QTY</th>
            <th>EXPIRES</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody id="inventory-table-body">
          <tr>
            <td colspan="6" class="empty-state">// LOADING STOCKPILE DATA...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Firebase CDN (compat v8) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- App scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
